services:
  mysql:
    image: mysql:8.4
    container_name: local-mysql
    restart: unless-stopped
    profiles: ['mysql', 'full']
    ports:
      - '3306:3306'
    command: --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-256M}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD:-root}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

  redis:
    image: redis:8.6-alpine
    container_name: local-redis
    restart: unless-stopped
    profiles: ['redis', 'full']
    ports:
      - '6379:6379'
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_default

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: local-rabbitmq
    restart: unless-stopped
    profiles: ['rabbitmq', 'full']
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit vm_memory_high_watermark ${RABBITMQ_MEMORY_WATERMARK:-0.2}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  infra_default:
    name: infra_default
    driver: bridge
