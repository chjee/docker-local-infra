services:
  mysql:
    image: mysql:8.4
    container_name: local-mysql
    restart: unless-stopped
    profiles: ['mysql', 'full']
    ports:
      - '3306:3306'
    command: --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-256M}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD:-root}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

  redis:
    image: redis:8.6-alpine
    container_name: local-redis
    restart: unless-stopped
    profiles: ['redis', 'full']
    ports:
      - '6379:6379'
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_default

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: local-rabbitmq
    restart: unless-stopped
    profiles: ['rabbitmq', 'full']
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit vm_memory_high_watermark ${RABBITMQ_MEMORY_WATERMARK:-0.2}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

  redpanda:
    image: redpandadata/redpanda:v25.2.7
    container_name: local-redpanda
    restart: unless-stopped
    profiles: ['redpanda', 'full']
    ports:
      - '9092:9092'
      - '9644:9644'
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - ${REDPANDA_MEMORY:-512M}
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'info']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

  mongodb:
    image: mongo:8.2
    container_name: local-mongodb
    restart: unless-stopped
    profiles: ['mongodb', 'full']
    ports:
      - '27017:27017'
    command: mongod --wiredTigerCacheSizeGB ${MONGO_CACHE_SIZE:-0.25}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin}
    volumes:
      - mongodb_data:/data/db
      - ./initdb/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_default

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  redpanda_data:
  mongodb_data:

networks:
  infra_default:
    name: infra_default
    driver: bridge
